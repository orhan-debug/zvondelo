<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подать заявку — ZvonDelo | Стать оператором холодных звонков</title>
<meta name="description" content="Заявка на работу оператором холодных звонков в ZvonDelo. Займет 2 минуты — ответим в течение рабочего дня.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" style="text-decoration:none"><div class="logo">Zvon<span>Delo</span></div></a>
    <div class="nav-links">
      <a href="index.html">Главная</a>
      <a href="faq.html">FAQ</a>
      <a class="btn-sm active" href="apply.html">Подать заявку</a>
    </div>
  </div>
</header>

<section class="form-sec" id="apply">
  <div class="wrap">
    <h2>Подать заявку</h2>
    <p class="sub">Ответим в течение одного рабочего дня.</p>
    <form onsubmit="event.preventDefault();alert('Спасибо! Ваша заявка отправлена. Мы свяжемся с вами в течение рабочего дня.');this.reset();">
      <div class="two">
        <div class="field"><label>Имя *</label><input required placeholder="Иван"></div>
        <div class="field"><label>Телефон *</label><input required type="tel" placeholder="+7 900 000-00-00"></div>
      </div>
      <div class="two">
        <div class="field"><label>Email</label><input type="email" placeholder="ivan@mail.ru"></div>
        <div class="field"><label>Город / часовой пояс</label><input placeholder="Москва, GMT+3"></div>
      </div>
      <div class="field"><label>Опыт в продажах или звонках</label>
        <select><option>Нет опыта — готов(а) учиться</option><option>До 1 года</option><option>1–3 года</option><option>Более 3 лет</option></select>
      </div>
      <div class="field"><label>Сколько часов в день готовы звонить?</label>
        <select><option>2–3 часа</option><option>4–5 часов</option><option>Полный день</option></select>
      </div>
      <div class="field"><label>Комментарий</label><textarea placeholder="Пара слов о себе и своем опыте"></textarea></div>
      <button type="submit">Отправить заявку</button>
      <div class="form-note">Нажимая кнопку, вы соглашаетесь с обработкой персональных данных.</div>
    </form>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="logo">Zvon<span style="color:var(--accent)">Delo</span></div>
    <div>Проект компании КЕНТАВР ЛОГИСТИКА · kentavr-log.ru</div>
    <div>© 2026 ZvonDelo. Все права защищены.</div>
  </div>
</footer>

</body>
</html>
